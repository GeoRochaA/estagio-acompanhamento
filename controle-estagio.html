<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Controle de Estagio</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #11120f;
      --panel: #171a18;
      --panel-soft: #121714;
      --panel-raised: #1e2420;
      --text: #f5f7f0;
      --muted: #a7afa6;
      --line: rgba(214, 220, 208, 0.18);
      --accent: #a3e635;
      --accent-dark: #65a30d;
      --accent-blue: #fb7185;
      --warning: #f59e0b;
      --danger: #fb7185;
      --ok: #34d399;
      --focus: #f97316;
      --shadow: 0 18px 50px rgba(0, 0, 0, 0.32);
      --glow: 0 0 0 1px rgba(163, 230, 53, 0.13), 0 0 28px rgba(251, 113, 133, 0.08);
      --body-grid-x: rgba(163, 230, 53, 0.052);
      --body-grid-y: rgba(251, 113, 133, 0.04);
      --body-gradient: linear-gradient(135deg, #11120f 0%, #151914 52%, #1a1517 100%);
      --body-shine: linear-gradient(180deg, rgba(255, 255, 255, 0.04), transparent 120px);
      --topbar-bg: rgba(23, 26, 24, 0.9);
      --title-glow: 0 0 18px rgba(163, 230, 53, 0.12);
      --button-hover-bg: #273027;
      --primary-bg: linear-gradient(135deg, #4d7c0f, #be123c);
      --primary-hover-bg: linear-gradient(135deg, #65a30d, #e11d48);
      --primary-shadow: 0 0 18px rgba(251, 113, 133, 0.16);
      --metric-bg: linear-gradient(180deg, rgba(30, 36, 32, 0.96), rgba(18, 23, 20, 0.96));
      --nav-bg: rgba(17, 18, 15, 0.86);
      --nav-link-bg: rgba(30, 36, 32, 0.9);
      --month-bg: rgba(23, 26, 24, 0.93);
      --month-header-bg: linear-gradient(90deg, rgba(163, 230, 53, 0.13), rgba(251, 113, 133, 0.09), rgba(245, 158, 11, 0.07));
      --toggle-border: rgba(163, 230, 53, 0.4);
      --toggle-bg: rgba(163, 230, 53, 0.08);
      --thead-bg: #121714;
      --weekend-bg: rgba(245, 158, 11, 0.06);
      --filled-bg: rgba(163, 230, 53, 0.09);
      --day-bg: #121714;
      --time-bg: #111613;
      --time-disabled-bg: #171c19;
      --time-disabled-text: #6e766d;
      --focus-ring: rgba(249, 115, 22, 0.28);
    }

    [data-theme="light"] {
      color-scheme: light;
      --bg: #f4f7f8;
      --panel: #ffffff;
      --panel-soft: #edf5f2;
      --panel-raised: #f9fbfb;
      --text: #18221c;
      --muted: #5d6a63;
      --line: rgba(32, 42, 36, 0.16);
      --accent: #0f766e;
      --accent-dark: #115e59;
      --accent-blue: #e11d48;
      --warning: #b45309;
      --danger: #be123c;
      --ok: #15803d;
      --focus: #ea580c;
      --shadow: 0 16px 34px rgba(24, 34, 28, 0.12);
      --glow: 0 0 0 1px rgba(15, 118, 110, 0.13), 0 16px 36px rgba(225, 29, 72, 0.08);
      --body-grid-x: rgba(15, 118, 110, 0.07);
      --body-grid-y: rgba(225, 29, 72, 0.045);
      --body-gradient: linear-gradient(135deg, #f7fafc 0%, #edf7f2 54%, #f8f5fb 100%);
      --body-shine: linear-gradient(180deg, rgba(255, 255, 255, 0.72), transparent 150px);
      --topbar-bg: rgba(255, 255, 255, 0.88);
      --title-glow: none;
      --button-hover-bg: #eef5f2;
      --primary-bg: linear-gradient(135deg, #0f766e, #e11d48);
      --primary-hover-bg: linear-gradient(135deg, #115e59, #be123c);
      --primary-shadow: 0 10px 20px rgba(15, 118, 110, 0.16);
      --metric-bg: linear-gradient(180deg, rgba(255, 255, 255, 0.98), rgba(247, 250, 252, 0.98));
      --nav-bg: rgba(244, 247, 248, 0.9);
      --nav-link-bg: rgba(255, 255, 255, 0.94);
      --month-bg: rgba(255, 255, 255, 0.94);
      --month-header-bg: linear-gradient(90deg, rgba(15, 118, 110, 0.12), rgba(225, 29, 72, 0.08), rgba(180, 83, 9, 0.07));
      --toggle-border: rgba(15, 118, 110, 0.38);
      --toggle-bg: rgba(15, 118, 110, 0.08);
      --thead-bg: #f3f7f5;
      --weekend-bg: rgba(180, 83, 9, 0.07);
      --filled-bg: rgba(15, 118, 110, 0.08);
      --day-bg: #ffffff;
      --time-bg: #ffffff;
      --time-disabled-bg: #edf1f3;
      --time-disabled-text: #7a847e;
      --focus-ring: rgba(234, 88, 12, 0.24);
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        linear-gradient(90deg, var(--body-grid-x) 1px, transparent 1px),
        linear-gradient(180deg, var(--body-grid-y) 1px, transparent 1px),
        var(--body-gradient);
      background-size: 40px 40px, 40px 40px, auto;
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
      line-height: 1.45;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: var(--body-shine);
    }

    button,
    input,
    summary {
      font: inherit;
    }

    .shell {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      padding: 24px 0 48px;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    .topbar {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 20px;
      align-items: start;
      padding: 18px;
      margin-bottom: 18px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--topbar-bg);
      box-shadow: var(--shadow), var(--glow);
      backdrop-filter: blur(14px);
    }

    .eyebrow {
      margin: 0 0 4px;
      color: var(--accent);
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.75rem, 4vw, 2.7rem);
      line-height: 1.05;
      letter-spacing: 0;
      text-shadow: var(--title-glow);
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 8px;
    }

    .control,
    .btn {
      min-height: 40px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel-raised);
      color: var(--text);
    }

    .control {
      width: 112px;
      padding: 8px 10px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 8px 12px;
      cursor: pointer;
      font-weight: 700;
      white-space: nowrap;
    }

    .btn:hover {
      border-color: var(--accent);
      background: var(--button-hover-bg);
    }

    .btn.primary {
      border-color: var(--accent);
      background: var(--primary-bg);
      color: #ffffff;
      box-shadow: var(--primary-shadow);
    }

    .btn.primary:hover {
      border-color: var(--accent-dark);
      background: var(--primary-hover-bg);
    }

    .btn.danger {
      color: var(--danger);
    }

    .icon-btn {
      width: 42px;
      padding: 8px;
    }

    .icon {
      width: 19px;
      height: 19px;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
    }

    .icon-moon {
      display: none;
    }

    [data-theme="light"] .icon-sun {
      display: none;
    }

    [data-theme="light"] .icon-moon {
      display: block;
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      margin: 18px 0;
    }

    .metric {
      min-height: 92px;
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--metric-bg);
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
    }

    .metric::before {
      content: "";
      position: absolute;
      inset: 0 auto 0 0;
      width: 3px;
      background: var(--accent);
    }

    .metric:nth-child(2)::before {
      background: var(--accent-blue);
    }

    .metric:nth-child(3)::before {
      background: var(--warning);
    }

    .metric:nth-child(4)::before {
      background: var(--ok);
    }

    .metric span {
      display: block;
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 700;
      text-transform: uppercase;
    }

    .metric strong {
      display: block;
      margin-top: 6px;
      font-size: clamp(1.35rem, 3vw, 2rem);
      line-height: 1.1;
      font-variant-numeric: tabular-nums;
    }

    .month-nav {
      position: sticky;
      top: 0;
      z-index: 5;
      display: flex;
      gap: 6px;
      overflow-x: auto;
      padding: 10px 0;
      margin: 10px 0 14px;
      background: var(--nav-bg);
      backdrop-filter: blur(8px);
    }

    .month-nav a {
      flex: 0 0 auto;
      padding: 8px 11px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--nav-link-bg);
      color: var(--text);
      font-size: 0.9rem;
      font-weight: 700;
      text-decoration: none;
    }

    .month-nav a:hover {
      border-color: var(--accent);
      color: var(--accent);
      box-shadow: var(--glow);
    }

    .month {
      margin: 18px 0;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--month-bg);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .month-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 16px;
      border-bottom: 0;
      background: var(--month-header-bg);
      cursor: pointer;
      list-style: none;
      user-select: none;
    }

    .month[open] .month-header {
      border-bottom: 1px solid var(--line);
    }

    .month-header::-webkit-details-marker {
      display: none;
    }

    .month-heading {
      display: flex;
      align-items: center;
      min-width: 0;
      gap: 12px;
    }

    .month-toggle {
      flex: 0 0 auto;
      width: 34px;
      height: 34px;
      border: 1px solid var(--toggle-border);
      border-radius: 8px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: var(--toggle-bg);
    }

    .month-toggle::before {
      content: "";
      width: 0;
      height: 0;
      border-top: 6px solid transparent;
      border-bottom: 6px solid transparent;
      border-left: 8px solid var(--accent);
      transform: translateX(1px);
      transition: transform 160ms ease;
    }

    .month[open] .month-toggle::before {
      transform: translateX(1px) rotate(90deg);
    }

    .month-title {
      margin: 0;
      font-size: 1.25rem;
      line-height: 1.2;
      white-space: nowrap;
    }

    .month-total {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 10px;
      color: var(--muted);
      font-size: 0.92rem;
      font-weight: 700;
      text-align: right;
    }

    .month-total strong {
      color: var(--text);
      font-variant-numeric: tabular-nums;
    }

    .table-wrap {
      overflow-x: auto;
      background: var(--panel);
    }

    table {
      width: 100%;
      min-width: 760px;
      border-collapse: collapse;
      table-layout: fixed;
    }

    th,
    td {
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: middle;
    }

    th {
      background: var(--thead-bg);
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 800;
      text-transform: uppercase;
    }

    tbody tr:last-child td {
      border-bottom: 0;
    }

    tbody tr.weekend {
      background: var(--weekend-bg);
    }

    tbody tr.filled {
      background: var(--filled-bg);
    }

    tbody tr.today td:first-child {
      box-shadow: inset 4px 0 0 var(--focus);
    }

    .col-day {
      width: 96px;
    }

    .col-week {
      width: 126px;
    }

    .col-presence {
      width: 104px;
      text-align: center;
    }

    .col-time {
      width: 132px;
    }

    .col-total {
      width: 116px;
    }

    .col-status {
      width: 112px;
    }

    .day-number {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 34px;
      height: 34px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--day-bg);
      font-weight: 800;
      font-variant-numeric: tabular-nums;
    }

    input[type="checkbox"] {
      width: 20px;
      height: 20px;
      accent-color: var(--accent);
      cursor: pointer;
    }

    input[type="time"] {
      width: 100%;
      min-height: 36px;
      padding: 6px 8px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--time-bg);
      color: var(--text);
      color-scheme: inherit;
    }

    input[type="time"]:disabled {
      background: var(--time-disabled-bg);
      color: var(--time-disabled-text);
    }

    input:focus-visible,
    button:focus-visible,
    a:focus-visible,
    summary:focus-visible {
      outline: 3px solid var(--focus-ring);
      outline-offset: 2px;
    }

    .day-total {
      font-weight: 800;
      font-variant-numeric: tabular-nums;
    }

    .status {
      color: var(--muted);
      font-size: 0.88rem;
      font-weight: 700;
    }

    .status.ok {
      color: var(--ok);
    }

    .status.warn {
      color: var(--warning);
    }

    @media (max-width: 860px) {
      .topbar {
        grid-template-columns: 1fr;
      }

      .actions {
        justify-content: flex-start;
      }

      .summary {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 560px) {
      .shell {
        width: min(100% - 20px, 1180px);
        padding-top: 16px;
      }

      .actions {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .actions .control,
      .actions .btn {
        width: 100%;
      }

      .summary {
        grid-template-columns: 1fr;
      }

      .month-header {
        align-items: flex-start;
        flex-direction: column;
      }

      .month-total {
        justify-content: flex-start;
        text-align: left;
      }
    }

    @media print {
      body {
        background: #ffffff;
        color: #111827;
      }

      .shell {
        width: 100%;
        padding: 0;
      }

      .actions,
      .month-nav {
        display: none;
      }

      .metric,
      .month {
        box-shadow: none;
      }

      .month {
        break-inside: avoid;
      }

      .month:not([open]) .table-wrap {
        display: block;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <div>
        <p class="eyebrow">Controle de frequencia</p>
        <h1>Acompanhamento de Estagio</h1>
      </div>

      <div class="actions" aria-label="Acoes do controle">
        <label>
          <span class="sr-only">Ano</span>
          <input class="control" id="yearInput" type="number" min="2000" max="2100" step="1" aria-label="Ano">
        </label>
        <button class="btn icon-btn" id="themeBtn" type="button" aria-label="Usar tema claro" title="Usar tema claro">
          <svg class="icon icon-sun" viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="12" cy="12" r="4"></circle>
            <path d="M12 2v2"></path>
            <path d="M12 20v2"></path>
            <path d="m4.93 4.93 1.41 1.41"></path>
            <path d="m17.66 17.66 1.41 1.41"></path>
            <path d="M2 12h2"></path>
            <path d="M20 12h2"></path>
            <path d="m6.34 17.66-1.41 1.41"></path>
            <path d="m19.07 4.93-1.41 1.41"></path>
          </svg>
          <svg class="icon icon-moon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M20.5 14.2A8.5 8.5 0 0 1 9.8 3.5 7 7 0 1 0 20.5 14.2z"></path>
          </svg>
        </button>
        <button class="btn primary" id="exportBtn" type="button">Exportar CSV</button>
        <button class="btn" id="printBtn" type="button">Imprimir</button>
        <button class="btn danger" id="clearBtn" type="button">Limpar ano</button>
      </div>
    </header>

    <section class="summary" aria-label="Resumo geral">
      <div class="metric">
        <span>Total geral</span>
        <strong id="grandTotal">0h 00min</strong>
      </div>
      <div class="metric">
        <span>Dias marcados</span>
        <strong id="presentDays">0</strong>
      </div>
      <div class="metric">
        <span>Dias com horario</span>
        <strong id="workedDays">0</strong>
      </div>
      <div class="metric">
        <span>Media por dia</span>
        <strong id="averageDay">0h 00min</strong>
      </div>
    </section>

    <nav class="month-nav" id="monthNav" aria-label="Meses"></nav>
    <section id="months" aria-label="Meses do ano"></section>
  </main>

  <script>
    const monthNames = [
      "Janeiro",
      "Fevereiro",
      "Marco",
      "Abril",
      "Maio",
      "Junho",
      "Julho",
      "Agosto",
      "Setembro",
      "Outubro",
      "Novembro",
      "Dezembro"
    ];

    const weekNames = [
      "Domingo",
      "Segunda",
      "Terca",
      "Quarta",
      "Quinta",
      "Sexta",
      "Sabado"
    ];

    const yearInput = document.querySelector("#yearInput");
    const monthNav = document.querySelector("#monthNav");
    const monthsRoot = document.querySelector("#months");
    const grandTotal = document.querySelector("#grandTotal");
    const presentDays = document.querySelector("#presentDays");
    const workedDays = document.querySelector("#workedDays");
    const averageDay = document.querySelector("#averageDay");
    const exportBtn = document.querySelector("#exportBtn");
    const printBtn = document.querySelector("#printBtn");
    const clearBtn = document.querySelector("#clearBtn");
    const themeBtn = document.querySelector("#themeBtn");

    const now = new Date();
    const themeStorageKey = "controle-estagio:theme";
    let activeYear = now.getFullYear();
    let records = {};

    applyTheme(loadTheme());
    yearInput.value = activeYear;
    loadYear(activeYear);
    renderYear();

    yearInput.addEventListener("change", () => {
      const nextYear = Number(yearInput.value);
      if (!Number.isInteger(nextYear) || nextYear < 2000 || nextYear > 2100) {
        yearInput.value = activeYear;
        return;
      }

      activeYear = nextYear;
      loadYear(activeYear);
      renderYear();
    });

    monthsRoot.addEventListener("input", handleRecordChange);
    monthsRoot.addEventListener("change", handleRecordChange);
    monthNav.addEventListener("click", handleMonthNavClick);

    exportBtn.addEventListener("click", exportCsv);
    printBtn.addEventListener("click", () => window.print());
    clearBtn.addEventListener("click", clearYear);
    themeBtn.addEventListener("click", toggleTheme);

    function storageKey(year) {
      return `controle-estagio:${year}`;
    }

    function loadTheme() {
      try {
        const savedTheme = localStorage.getItem(themeStorageKey);
        return savedTheme === "light" ? "light" : "dark";
      } catch (error) {
        return "dark";
      }
    }

    function saveTheme(theme) {
      try {
        localStorage.setItem(themeStorageKey, theme);
      } catch (error) {
        return;
      }
    }

    function applyTheme(theme) {
      document.documentElement.dataset.theme = theme;
      const nextLabel = theme === "light" ? "Usar tema escuro" : "Usar tema claro";
      themeBtn.setAttribute("aria-label", nextLabel);
      themeBtn.title = nextLabel;
    }

    function toggleTheme() {
      const nextTheme = document.documentElement.dataset.theme === "light" ? "dark" : "light";
      applyTheme(nextTheme);
      saveTheme(nextTheme);
    }

    function loadYear(year) {
      try {
        records = JSON.parse(localStorage.getItem(storageKey(year))) || {};
      } catch (error) {
        records = {};
      }
    }

    function saveYear() {
      localStorage.setItem(storageKey(activeYear), JSON.stringify(records));
    }

    function recordKey(month, day) {
      return `${month + 1}-${day}`;
    }

    function parseTime(value) {
      if (!value) return null;
      const parts = value.split(":").map(Number);
      if (parts.length !== 2 || parts.some(Number.isNaN)) return null;
      return parts[0] * 60 + parts[1];
    }

    function getMinutes(record) {
      if (!record || !record.present) return 0;
      const start = parseTime(record.start);
      const end = parseTime(record.end);
      if (start === null || end === null || end <= start) return 0;
      return end - start;
    }

    function isInvalidTime(record) {
      if (!record || !record.present || !record.start || !record.end) return false;
      const start = parseTime(record.start);
      const end = parseTime(record.end);
      return start !== null && end !== null && end <= start;
    }

    function formatDuration(minutes) {
      const hours = Math.floor(minutes / 60);
      const mins = minutes % 60;
      return `${hours}h ${String(mins).padStart(2, "0")}min`;
    }

    function daysInMonth(year, month) {
      return new Date(year, month + 1, 0).getDate();
    }

    function renderYear() {
      renderMonthNav();
      monthsRoot.innerHTML = monthNames.map((monthName, month) => renderMonth(monthName, month)).join("");
      updateAllRows();
      updateTotals();
    }

    function renderMonthNav() {
      monthNav.innerHTML = monthNames
        .map((name, month) => `<a href="#mes-${month}" data-open-month="${month}">${name}</a>`)
        .join("");
    }

    function renderMonth(monthName, month) {
      const rows = [];
      const totalDays = daysInMonth(activeYear, month);

      for (let day = 1; day <= totalDays; day += 1) {
        const date = new Date(activeYear, month, day);
        const weekDay = date.getDay();
        const key = recordKey(month, day);
        const isToday =
          activeYear === now.getFullYear() &&
          month === now.getMonth() &&
          day === now.getDate();
        const rowClasses = [
          weekDay === 0 || weekDay === 6 ? "weekend" : "",
          isToday ? "today" : ""
        ].filter(Boolean).join(" ");

        rows.push(`
          <tr class="${rowClasses}" data-key="${key}" data-month="${month}" data-day="${day}">
            <td class="col-day"><span class="day-number">${String(day).padStart(2, "0")}</span></td>
            <td class="col-week">${weekNames[weekDay]}</td>
            <td class="col-presence">
              <input type="checkbox" data-field="present" aria-label="Presenca em ${day} de ${monthName}">
            </td>
            <td class="col-time">
              <input type="time" data-field="start" aria-label="Inicio em ${day} de ${monthName}">
            </td>
            <td class="col-time">
              <input type="time" data-field="end" aria-label="Fim em ${day} de ${monthName}">
            </td>
            <td class="col-total day-total">0h 00min</td>
            <td class="col-status status"></td>
          </tr>
        `);
      }

      return `
        <details class="month" id="mes-${month}">
          <summary class="month-header">
            <span class="month-heading">
              <span class="month-toggle" aria-hidden="true"></span>
              <span class="month-title">${monthName}</span>
            </span>
            <div class="month-total">
              <span>Dias: <strong id="month-days-${month}">0</strong></span>
              <span>Total: <strong id="month-total-${month}">0h 00min</strong></span>
            </div>
          </summary>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th class="col-day">Dia</th>
                  <th class="col-week">Semana</th>
                  <th class="col-presence">Vim</th>
                  <th class="col-time">Inicio</th>
                  <th class="col-time">Fim</th>
                  <th class="col-total">Horas</th>
                  <th class="col-status">Status</th>
                </tr>
              </thead>
              <tbody>${rows.join("")}</tbody>
            </table>
          </div>
        </details>
      `;
    }

    function handleMonthNavClick(event) {
      const link = event.target.closest("[data-open-month]");
      if (!link) return;

      event.preventDefault();
      const month = link.dataset.openMonth;
      const details = document.querySelector(`#mes-${month}`);
      if (!details) return;

      details.open = true;
      details.scrollIntoView({ behavior: "smooth", block: "start" });
    }

    function handleRecordChange(event) {
      const target = event.target;
      const row = target.closest("tr[data-key]");
      if (!row) return;

      const key = row.dataset.key;
      const field = target.dataset.field;
      const current = records[key] || { present: false, start: "", end: "" };

      if (field === "present") {
        current.present = target.checked;
      }

      if (field === "start" || field === "end") {
        current[field] = target.value;
        current.present = true;
      }

      records[key] = current;
      saveYear();
      updateRow(row, current);
      updateTotals();
    }

    function updateAllRows() {
      document.querySelectorAll("tr[data-key]").forEach((row) => {
        updateRow(row, records[row.dataset.key]);
      });
    }

    function updateRow(row, record) {
      const safeRecord = record || { present: false, start: "", end: "" };
      const presentInput = row.querySelector('[data-field="present"]');
      const startInput = row.querySelector('[data-field="start"]');
      const endInput = row.querySelector('[data-field="end"]');
      const totalCell = row.querySelector(".day-total");
      const statusCell = row.querySelector(".status");
      const minutes = getMinutes(safeRecord);

      presentInput.checked = Boolean(safeRecord.present);
      startInput.disabled = !safeRecord.present;
      endInput.disabled = !safeRecord.present;
      startInput.value = safeRecord.start || "";
      endInput.value = safeRecord.end || "";
      totalCell.textContent = formatDuration(minutes);
      row.classList.toggle("filled", Boolean(safeRecord.present));

      statusCell.classList.remove("ok", "warn");
      if (!safeRecord.present) {
        statusCell.textContent = "";
      } else if (!safeRecord.start || !safeRecord.end) {
        statusCell.textContent = "Pendente";
        statusCell.classList.add("warn");
      } else if (isInvalidTime(safeRecord)) {
        statusCell.textContent = "Conferir";
        statusCell.classList.add("warn");
      } else {
        statusCell.textContent = "OK";
        statusCell.classList.add("ok");
      }
    }

    function updateTotals() {
      const monthlyMinutes = Array(12).fill(0);
      const monthlyDays = Array(12).fill(0);
      let totalMinutes = 0;
      let totalPresent = 0;
      let totalWorked = 0;

      Object.entries(records).forEach(([key, record]) => {
        if (!record || !record.present) return;

        const month = Number(key.split("-")[0]) - 1;
        const minutes = getMinutes(record);
        totalPresent += 1;
        monthlyDays[month] += 1;
        monthlyMinutes[month] += minutes;
        totalMinutes += minutes;
        if (minutes > 0) totalWorked += 1;
      });

      monthlyMinutes.forEach((minutes, month) => {
        document.querySelector(`#month-total-${month}`).textContent = formatDuration(minutes);
        document.querySelector(`#month-days-${month}`).textContent = monthlyDays[month];
      });

      grandTotal.textContent = formatDuration(totalMinutes);
      presentDays.textContent = totalPresent;
      workedDays.textContent = totalWorked;
      averageDay.textContent = formatDuration(totalWorked ? Math.round(totalMinutes / totalWorked) : 0);
    }

    function clearYear() {
      const confirmed = window.confirm(`Limpar todos os registros de ${activeYear}?`);
      if (!confirmed) return;

      records = {};
      localStorage.removeItem(storageKey(activeYear));
      renderYear();
    }

    function csvCell(value) {
      return `"${String(value).replaceAll('"', '""')}"`;
    }

    function exportCsv() {
      const lines = [[
        "Ano",
        "Mes",
        "Dia",
        "Semana",
        "Presenca",
        "Inicio",
        "Fim",
        "Horas"
      ].map(csvCell).join(",")];

      monthNames.forEach((monthName, month) => {
        const totalDays = daysInMonth(activeYear, month);
        for (let day = 1; day <= totalDays; day += 1) {
          const key = recordKey(month, day);
          const record = records[key];
          if (!record || !record.present) continue;

          const weekDay = new Date(activeYear, month, day).getDay();
          lines.push([
            activeYear,
            monthName,
            String(day).padStart(2, "0"),
            weekNames[weekDay],
            "Sim",
            record.start || "",
            record.end || "",
            formatDuration(getMinutes(record))
          ].map(csvCell).join(","));
        }
      });

      const blob = new Blob([lines.join("\n")], { type: "text/csv;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = `controle-estagio-${activeYear}.csv`;
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
    }
  </script>
</body>
</html>
